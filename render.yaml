services:
  - type: web
    name: pd-detect-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: MALLOC_TRIM_THRESHOLD_
        value: "65536"
    autoDeploy: true
    plan: starter
